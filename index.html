<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Tebak Angka Challenge</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; background: #74ebd5; }
    .container { margin-top: 40px; background: white; padding: 20px; border-radius: 10px; display: inline-block; }
    h1 { color: #4a47a3; }
    input, button { padding: 10px; margin: 5px; }
    .feedback { margin-top: 15px; font-weight: bold; }
    #leaderboard { margin-top: 20px; text-align: left; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎲 Tebak Angka Challenge</h1>
    <p>Masukkan nama pemain:</p>
    <input type="text" id="namaPemain" placeholder="Nama kamu">
    <button onclick="mulaiGame()">Mulai Game</button>
    
    <div id="gameArea" style="display:none;">
      <p>Tebak angka antara 1–20. Kamu hanya punya 4 percobaan 🤯</p>
      <input type="number" id="guess" min="1" max="20" placeholder="Angka">
      <button onclick="checkGuess()">Submit</button>
      <button onclick="resetGame()">Main Lagi 🔄</button>
      <div id="progress">Percobaan: 0/4</div>
      <div class="feedback" id="feedback"></div>
    </div>

    <div id="leaderboard"></div>
  </div>

  <script>
    let angkaRahasia, percobaan, batas, skorTotal = 0, nama;

    function mulaiGame() {
      nama = document.getElementById("namaPemain").value;
      if (!nama) { alert("Isi nama dulu!"); return; }
      document.getElementById("gameArea").style.display = "block";
      resetGame();
      tampilkanLeaderboard();
    }

    function checkGuess() {
      let tebakan = parseInt(document.getElementById("guess").value);
      percobaan++;
      let poin = percobaan === 1 ? 100 : percobaan === 2 ? 75 : percobaan === 3 ? 50 : 25;

      document.getElementById("progress").innerText = "Percobaan: " + percobaan + "/" + batas;

      if (tebakan === angkaRahasia) {
        skorTotal += poin;
        simpanLeaderboard(nama, skorTotal);
        document.getElementById("feedback").innerText =
          `🎉 Kamu menang! Tebakanmu benar ${angkaRahasia}. Kamu dapat ${poin} poin 🎯. Skor total: ${skorTotal} ⭐`;
        tampilkanLeaderboard();
      } else if (percobaan >= batas) {
        document.getElementById("feedback").innerText =
          `😂 Kamu kehabisan percobaan. Angka yang benar adalah ${angkaRahasia}`;
      } else if (tebakan < angkaRahasia) {
        document.getElementById("feedback").innerText = `${tebakan} terlalu kecil 👶. Kamu kehilangan ${poin} poin 😾`;
      } else {
        document.getElementById("feedback").innerText = `${tebakan} terlalu besar 🏔️. Kamu kehilangan ${poin} poin ⏳`;
      }
    }

    function resetGame() {
      angkaRahasia = Math.floor(Math.random() * 20) + 1;
      percobaan = 0;
      batas = 4;
      document.getElementById("progress").innerText = "Percobaan: 0/4";
      document.getElementById("feedback").innerText = "";
      document.getElementById("guess").value = "";
    }

    function simpanLeaderboard(nama, skor) {
      let leaderboard = JSON.parse(localStorage.getItem("leaderboard")) || [];
      let existing = leaderboard.find(player => player.nama === nama);
      if (existing) {
        existing.skor = skor; // update skor
      } else {
        leaderboard.push({ nama: nama, skor: skor });
      }
      leaderboard.sort((a, b) => b.skor - a.skor);
      localStorage.setItem("leaderboard", JSON.stringify(leaderboard));
    }

    function tampilkanLeaderboard() {
      let leaderboard = JSON.parse(localStorage.getItem("leaderboard")) || [];
      let html = "<h2>🏆 Leaderboard</h2><ol>";
      leaderboard.forEach(player => {
        html += `<li>${player.nama} - ${player.skor} ⭐</li>`;
      });
      html += "</ol>";
      document.getElementById("leaderboard").innerHTML = html;
    }
  </script>
</body>
</html>
